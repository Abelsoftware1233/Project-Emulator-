<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abelsoftware123 SNES Hack Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="display-section">
            <canvas id="screen" width="256" height="224"></canvas>
            <div id="osd">SYSTEM READY</div>
            
            <div id="debug-info">
                OFFSET: <span id="val-offset">0</span><br>
                ZOOM: <span id="val-zoom">256</span>
            </div>
        </div>

        <div class="ui-controls">
            <div class="control-row">
                <label class="btn file-btn">
                    LOAD ROM <input type="file" id="rom-input" hidden>
                </label>
                <div class="save-load-group">
                    <button class="btn tiny" onclick="snes.saveState()">SAVE</button>
                    <button class="btn tiny" onclick="snes.loadState()">LOAD</button>
                </div>
            </div>
            <button id="power-btn" class="btn danger full-width">POWER / RESET</button>
        </div>

        <div class="gamepad-viewport">
            <div class="dpad">
                <button class="ctrl-btn up" data-key="up">↑</button>
                <button class="ctrl-btn left" data-key="left">←</button>
                <button class="ctrl-btn right" data-key="right">→</button>
                <button class="ctrl-btn down" data-key="down">↓</button>
            </div>
            
            <div class="action-btns-diamond">
                <button class="ctrl-btn x-btn" data-key="x">X</button>
                <button class="ctrl-btn y-btn" data-key="y">Y</button>
                <button class="ctrl-btn b-btn" data-key="b">B</button>
                <button class="ctrl-btn a-btn" data-key="a">A</button>
            </div>
        </div>
    </div>

    <script src="emulator.js"></script>
    
    <script>
        // Update de debug waarden op het scherm
        setInterval(() => {
            if (window.snes) {
                document.getElementById('val-offset').innerText = snes.hackOffset || 0;
                document.getElementById('val-zoom').innerText = snes.m7 ? snes.m7.a : 256;
            }
        }, 100);
    </script>
</body>
</html>
